; =============================================================================
; UDP Log Receiver configuration
; =============================================================================

[receiver]
; IP and port to listen on (must match sender's remote_ip/remote_port)
bind_ip   = 0.0.0.0
bind_port = 9001

; Minimum level to DISPLAY (0=EMERG … 7=DEBUG).
; Set to 3 to show only ERR and above; set to 7 to show everything.
min_level = 7

; Color terminal output (0=off, 1=ANSI colors)
color_output = 1

; Decrypt incoming payloads (requires matching key_file)
decrypt = 1
key_file = /tmp/logger_data/.logger_key

