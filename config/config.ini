; =============================================================================
; embedded-logger configuration file
; =============================================================================

[general]
; Minimum log level to record/send (0=EMERG … 7=DEBUG)
min_level = 7

[storage]
; Directory where log files are stored
dir = /tmp/logger_data

; Maximum size per log file (bytes). Default: 1 MB
max_file_size = 1048576

; Maximum total size for all log files (bytes). Default: 10 MB
max_total_size = 10485760

; Encrypt log files on disk (0=off, 1=AES-256-CBC)
encrypt = 0

[transport]
; Local IP and port for the query/loopback server
bind_ip   = 0.0.0.0
bind_port = 9000

; Remote receiver IP and port (where log lines are streamed)
remote_ip   = 106.13.126.96
remote_port = 9001

; Interval between real-time log sends (milliseconds)
send_interval_ms = 500

; UDP chunk size for large file transfers (bytes, max 1400)
chunk_size = 1400

; Encrypt UDP payloads (0=off, 1=AES-256-CBC)
encrypt = 0

[protection]
; Deduplication time window (milliseconds)
; Identical messages within this window trigger suppression after max_count.
dedup_window_ms = 5000

; Maximum occurrences of an identical message before suppression
dedup_max_count = 10
